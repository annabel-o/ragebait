
<body>
  <nav></nav>
  <main></main>
</body>

<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>

<script>
/* global nn */

let isDrawing = false

//Ragebait Comments
const comments = [
  'mid',
  'try again',
  'be serious',
  'that was a choice',
  'are you done?',
  'bold of you',
  'interesting...',
  'delete this',
  'that is enough'
]

//Dots 
function draw () {
  if (isDrawing === false) return

  nn.create('div')
    .content('●')
    .positionOrigin('center')
    .position(nn.mouseX, nn.mouseY)
    .css({
      position: 'absolute',
      fontSize: '18px',
      color: currentColor,
      pointerEvents: 'none'
    })
    .addTo('main')

  
  //comment background and effects
  if (Math.random() < 200) {
    const randomComment = comments[Math.floor(Math.random() * comments.length)]

    nn.create('div')
      .content(randomComment)
      .position(nn.mouseX + 20, nn.mouseY)
      .css({
        position: 'absolute',
        background: 'yellow',
        border: '2px solid black',
        padding: '5px',
        fontFamily: 'monospace',
        pointerEvents: 'none'
      })
      .addTo('main')
  }
}
  
  nn.on('mousedown', function() {
    isDrawing = true
    //change to random color each click using Hue Saturation and Lightness from color widget
    currentColor= `hsl(${Math.random() * 360}, 100%, 50%)`
  })

  //SAVE BUTTON
nn.create('button')
  .content('save?')
  .addTo('nav')
  .on('click', function () {
    alert('are you sure this is worth saving?')
  })

nn.on('mousedown', function () {
  isDrawing = true
})

nn.on('mouseup', function () {
  isDrawing = false
})

  
nn.on('mousemove', draw)
</script>
